<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASL Hand Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.3px; }
    h1 span { color: #7c6af7; }

    #status {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #aaa;
    }

    .video-panel {
      width: 100%;
      max-width: 720px;
      position: relative;
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
    }

    #input_video { display: none; }

    #output_canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
  </style>
</head>
<body>

  <header>
    <h1>ASL <span>Hand Tracker</span></h1>
    <div id="status">Loading…</div>
  </header>

  <div class="video-panel">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver,
      DrawingUtils
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video    = document.getElementById("input_video");
    const canvas   = document.getElementById("output_canvas");
    const ctx      = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    let handLandmarker = null;
    let drawingUtils   = null;
    let lastVideoTime  = -1;

    async function initMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU",
        },
        runningMode:                "VIDEO",
        numHands:                   2,
        minHandDetectionConfidence: 0.5,
        minHandPresenceConfidence:  0.5,
        minTrackingConfidence:      0.5,
      });
      drawingUtils = new DrawingUtils(ctx);
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: 640, height: 480 },
        audio: false,
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadeddata = r);
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
    }

    function onFrame() {
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const results = handLandmarker.detectForVideo(video, Date.now());

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        if (results.landmarks) {
          for (const lms of results.landmarks) {
            drawingUtils.drawConnectors(lms, HandLandmarker.HAND_CONNECTIONS, {
              color: "#7c6af7", lineWidth: 2,
            });
            drawingUtils.drawLandmarks(lms, {
              color: "#a78bfa", lineWidth: 1, radius: 3,
            });
          }
        }
      }
      requestAnimationFrame(onFrame);
    }

    async function init() {
      await Promise.all([initMediaPipe(), startCamera()]);
      statusEl.textContent = "Ready";
      requestAnimationFrame(onFrame);
    }

    init().catch(err => {
      statusEl.textContent = "Error";
      console.error(err);
    });
  </script>
</body>
</html>
